<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; display: grid; place-items: center; height: 100vh; font-family: system-ui; background: #0f172a; color: #e2e8f0; }
  .dot { width: 24px; height: 24px; border-radius: 50%; background: #38bdf8; animation: hop 1s infinite alternate ease-in-out; }
  @keyframes hop { to { transform: translateY(-40px); background: #f472b6; } }
</style>
</head>
<body>
  <div style="text-align:center">
    <div class="dot" style="margin:0 auto 16px"></div>
    <p>אנימציית בדיקה — אם רואים את הנקודה קופצת, ה-iframe עובד.</p>
  </div>
</body>
</html>
